server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: info
    org.hibernate.SQL: off

app:
  frontend:
    url: ${FRONTEND_URL}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  master:
    email: ${MASTER_ADMIN_EMAIL:admin@mapaeleitoral.com}
    password: ${MASTER_ADMIN_PASSWORD}